  - "reselect@5.1.1"
  - "semver@6.3.1"
blockExoticSubdeps: true

overrides:
  "flatted@<=3.4.1": ">=3.4.2"
  "yaml@>=1.0.0 <1.10.3": ">=1.10.3"
  "yaml@>=2.0.0 <2.8.3": ">=2.8.3"
  "postcss@<8.5.10": "8.5.13"
  "next>postcss": "8.5.15"
  "js-yaml@<=4.2.0": "4.3.0"
  "sharp@<0.35.0": "0.35.0"
  "next>sharp": "0.35.0"
  "jspdf>dompurify": "3.4.12"
  "@supabase/realtime-js>ws": "8.21.0"
  "cosmiconfig>yaml": "2.8.3"
  "picomatch@<2.3.2": ">=2.3.2"
  "picomatch@>=4.0.0 <4.0.4": ">=4.0.4"
  "picomatch@4.0.3": "4.0.4"
  "micromatch>picomatch": "4.0.4"

allowBuilds:
  core-js: false
  sharp: true
  tesseract.js: false
  unrs-resolver: false
